<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipcoin Deluxe V2</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    margin-top:20px;
}

input{
    padding:10px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    cursor:pointer;
    border:none;
    border-radius:10px;
    padding:10px 15px;
    margin:5px;
    font-size:16px;
}

#saveBtn{
    background:#4caf50;
    color:white;
}

#coin{
    font-size:120px;
    margin:20px;
    transition:0.3s;
    display:inline-block;
}

.flip{
    animation:flipCoin .8s ease;
}

@keyframes flipCoin{
    0%{transform:rotateY(0deg);}
    100%{transform:rotateY(1080deg);}
}

#counter,
#highscore{
    font-size:24px;
    margin:10px;
}

#result{
    font-size:28px;
    margin-top:15px;
    font-weight:bold;
}

#flipBtn{
    background:#f0c040;
    color:white;
    font-size:20px;
    padding:15px 25px;
}

#shopButton{
    position:fixed;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    background:#2196f3;
    color:white;
    z-index:1000;
}

#shop{
    position:fixed;
    top:0;
    right:-420px;
    width:400px;
    max-width:90%;
    height:100%;
    background:white;
    box-shadow:-5px 0 15px rgba(0,0,0,.2);
    transition:.4s;
    overflow:auto;
    padding:20px;
    z-index:999;
}

#shop.open{
    right:0;
}

#closeShop{
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    color:white;
}

.shopTitle{
    margin-top:30px;
    font-size:28px;
}

.category{
    margin-top:25px;
}

.buyBtn{
    background:#4caf50;
    color:white;
}

.buyBtn:disabled{
    background:#999;
}

#activeBox{
    position:fixed;
    left:10px;
    bottom:10px;
    background:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    text-align:left;
}

.fire{
    text-shadow:
    0 0 10px orange,
    0 0 20px red;
}

.blitz{
    text-shadow:
    0 0 10px yellow,
    0 0 20px gold;
}

.rainbow{
    animation:rainbow 2s linear infinite;
}

@keyframes rainbow{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

</style>
</head>
<body>

<h1>🪙 Flipcoin Deluxe V2</h1>

<input id="username" placeholder="Benutzername">
<button id="saveBtn" onclick="saveName()">
Speichern
</button>

<h3 id="welcome"></h3>

<div id="counter">Flips: 0</div>
<div id="highscore">Highscore: 0</div>

<div id="coin">🪙</div>

<br>

<button id="flipBtn" onclick="flipCoin()">
Münze werfen
</button>

<div id="result"></div>

<button id="shopButton"
onclick="toggleShop()">
🛒 Shop
</button>

<div id="shop">

<button id="closeShop"
onclick="toggleShop()">
✖
</button>

<h2 class="shopTitle">
Shop
</h2>

<h3 class="category">
Multiplikatoren
</h3>

<button
id="buyX2"
class="buyBtn"
onclick="buyX2()">
⚡ x2 (1000)
</button>

<button
id="buyX5"
class="buyBtn"
onclick="buyX5()">
🚀 x5 (10000)
</button>

<h3 class="category">
Effekte
</h3>

<button
id="buyFire"
class="buyBtn"
onclick="buyEffect('Feuer',500)">
🔥 Feuer (500)
</button>

<button
id="buyBlitz"
class="buyBtn"
onclick="buyEffect('Blitz',2000)">
⚡ Blitz (2000)
</button>

<button
id="buyRainbow"
class="buyBtn"
onclick="buyEffect('Regenbogen',5000)">
🌈 Regenbogen (5000)
</button>

<h3 class="category">
Sounds
</h3>

<button
id="buyCoinSound"
class="buyBtn"
onclick="buySound('Münze',250)">
🪙 Münzsound (250)
</button>

<button
id="buyBell"
class="buyBtn"
onclick="buySound('Glocke',1000)">
🔔 Glocke (1000)
</button>

<button
id="buyParty"
class="buyBtn"
onclick="buySound('Party',5000)">
🎉 Party (5000)
</button>

</div>

<div id="activeBox">

<b>Aktiv</b><br>

Multiplikator:
<span id="activeMultiplier">
x1
</span>

<br>

Effekt:
<span id="activeEffect">
Keiner
</span>

<br>

Sound:
<span id="activeSound">
Keiner
</span>

</div>

<script>
    let flips = parseInt(localStorage.getItem("flips")) || 0;
let highscore = parseInt(localStorage.getItem("highscore")) || 0;

let username = localStorage.getItem("username") || "";

let multiplier = parseInt(localStorage.getItem("multiplier")) || 1;

let activeEffect =
localStorage.getItem("activeEffect") || "Keiner";

let activeSound =
localStorage.getItem("activeSound") || "Keiner";

let boughtX2 =
localStorage.getItem("boughtX2") === "true";

let boughtX5 =
localStorage.getItem("boughtX5") === "true";

document.getElementById("username").value = username;

if(username){
    document.getElementById("welcome").textContent =
    "Willkommen " + username + "!";
}

function saveName(){

    username =
    document.getElementById("username")
    .value.trim();

    if(username){

        localStorage.setItem(
        "username",
        username
        );

        document.getElementById("welcome")
        .textContent =
        "Willkommen " + username + "!";
    }
}

function toggleShop(){

    document.getElementById("shop")
    .classList.toggle("open");
}

function updateStats(){

    document.getElementById("counter")
    .textContent =
    "Flips: " + flips;

    document.getElementById("highscore")
    .textContent =
    "Highscore: " + highscore;

    document.getElementById("activeMultiplier")
    .textContent =
    "x" + multiplier;

    document.getElementById("activeEffect")
    .textContent =
    activeEffect;

    document.getElementById("activeSound")
    .textContent =
    activeSound;

    updateCoin();
}

function updateCoin(){

    const coin =
    document.getElementById("coin");

    coin.className = "";

    if(activeEffect === "Feuer"){
        coin.classList.add("fire");
    }

    if(activeEffect === "Blitz"){
        coin.classList.add("blitz");
    }

    if(activeEffect === "Regenbogen"){
        coin.classList.add("rainbow");
    }

    if(flips >= 10000){
        coin.textContent = "🌈";
    }
    else if(flips >= 1000){
        coin.textContent = "💎";
    }
    else if(flips >= 100){
        coin.textContent = "🥇";
    }
    else if(flips >= 10){
        coin.textContent = "🥈";
    }
    else{
        coin.textContent = "🪙";
    }
}

function saveAll(){

    localStorage.setItem(
    "flips",
    flips
    );

    localStorage.setItem(
    "highscore",
    highscore
    );

    localStorage.setItem(
    "multiplier",
    multiplier
    );

    localStorage.setItem(
    "activeEffect",
    activeEffect
    );

    localStorage.setItem(
    "activeSound",
    activeSound
    );
}
    function playSound(){

    const audio =
    new (window.AudioContext ||
    window.webkitAudioContext)();

    const osc =
    audio.createOscillator();

    const gain =
    audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    if(activeSound === "Münze"){
        osc.frequency.value = 400;
    }
    else if(activeSound === "Glocke"){
        osc.frequency.value = 700;
    }
    else if(activeSound === "Party"){
        osc.frequency.value = 1000;
    }
    else{
        return;
    }

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audio.currentTime + 0.2
    );

    osc.stop(
    audio.currentTime + 0.2
    );
}

function flipCoin(){

    flips += multiplier;

    if(flips > highscore){
        highscore = flips;
    }

    saveAll();

    updateStats();

    const coin =
    document.getElementById("coin");

    coin.classList.remove("flip");

    void coin.offsetWidth;

    coin.classList.add("flip");

    playSound();

    const result =
    Math.random() < 0.5
    ? "Kopf"
    : "Zahl";

    setTimeout(() => {

        document.getElementById("result")
        .textContent =
        "Ergebnis: " + result;

    }, 400);
}

function buyX2(){

    if(boughtX2){
        alert("Bereits gekauft!");
        return;
    }

    if(flips < 1000){
        alert("Nicht genug Flips!");
        return;
    }

    flips -= 1000;

    multiplier = 2;

    boughtX2 = true;

    localStorage.setItem(
    "boughtX2",
    true
    );

    document.getElementById("buyX2")
    .disabled = true;

    saveAll();

    updateStats();
}

function buyX5(){

    if(boughtX5){
        alert("Bereits gekauft!");
        return;
    }

    if(flips < 10000){
        alert("Nicht genug Flips!");
        return;
    }

    flips -= 10000;

    multiplier = 5;

    boughtX5 = true;

    localStorage.setItem(
    "boughtX5",
    true
    );

    document.getElementById("buyX5")
    .disabled = true;

    saveAll();

    updateStats();
}

function buyEffect(name,cost){

    if(flips < cost){
        alert("Nicht genug Flips!");
        return;
    }

    flips -= cost;

    activeEffect = name;

    saveAll();

    updateStats();
}

function buySound(name,cost){

    if(flips < cost){
        alert("Nicht genug Flips!");
        return;
    }

    flips -= cost;

    activeSound = name;

    saveAll();

    updateStats();
}

if(boughtX2){

    document.getElementById("buyX2")
    .disabled = true;
}

if(boughtX5){

    document.getElementById("buyX5")
    .disabled = true;
}

updateStats();
// --- Teil 4 ---

let boughtEffects =
JSON.parse(localStorage.getItem("boughtEffects")) || {};

let boughtSounds =
JSON.parse(localStorage.getItem("boughtSounds")) || {};

function markBoughtButtons(){

    if(boughtEffects.Feuer){
        document.getElementById("buyFire")
        .textContent = "🔥 Feuer ✓";
        document.getElementById("buyFire")
        .disabled = true;
    }

    if(boughtEffects.Blitz){
        document.getElementById("buyBlitz")
        .textContent = "⚡ Blitz ✓";
        document.getElementById("buyBlitz")
        .disabled = true;
    }

    if(boughtEffects.Regenbogen){
        document.getElementById("buyRainbow")
        .textContent = "🌈 Regenbogen ✓";
        document.getElementById("buyRainbow")
        .disabled = true;
    }

    if(boughtSounds.Münze){
        document.getElementById("buyCoinSound")
        .textContent = "🪙 Münzsound ✓";
        document.getElementById("buyCoinSound")
        .disabled = true;
    }

    if(boughtSounds.Glocke){
        document.getElementById("buyBell")
        .textContent = "🔔 Glocke ✓";
        document.getElementById("buyBell")
        .disabled = true;
    }

    if(boughtSounds.Party){
        document.getElementById("buyParty")
        .textContent = "🎉 Party ✓";
        document.getElementById("buyParty")
        .disabled = true;
    }
}

function buyEffect(name,cost){

    if(boughtEffects[name]){
        alert("Bereits gekauft!");
        return;
    }

    if(flips < cost){
        alert("Nicht genug Flips!");
        return;
    }

    flips -= cost;

    activeEffect = name;

    boughtEffects[name] = true;

    localStorage.setItem(
    "boughtEffects",
    JSON.stringify(boughtEffects)
    );

    saveAll();
    updateStats();
    markBoughtButtons();
}

function buySound(name,cost){

    if(boughtSounds[name]){
        alert("Bereits gekauft!");
        return;
    }

    if(flips < cost){
        alert("Nicht genug Flips!");
        return;
    }

    flips -= cost;

    activeSound = name;

    boughtSounds[name] = true;

    localStorage.setItem(
    "boughtSounds",
    JSON.stringify(boughtSounds)
    );

    saveAll();
    updateStats();
    markBoughtButtons();
}

markBoughtButtons();
</script>
</body>
</html>
