<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipcoin</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:40px;
    background:#f5f5f5;
}

#coin{
    font-size:120px;
    margin:30px;
    display:inline-block;
}

.flip{
    animation:flipCoin .8s ease;
}

@keyframes flipCoin{
    0%{transform:rotateY(0deg);}
    100%{transform:rotateY(1080deg);}
}

button{
    padding:12px 20px;
    font-size:16px;
    margin:5px;
    cursor:pointer;
}

input{
    padding:10px;
    font-size:16px;
}

#result{
    margin-top:20px;
    font-size:24px;
}

.shop{
    margin-top:30px;
    padding:15px;
    background:white;
    display:inline-block;
    border-radius:10px;
}
</style>
</head>
<body>

<h1>🪙 Flipcoin</h1>

<input id="username" placeholder="Benutzername">
<button onclick="saveName()">Speichern</button>

<h3 id="welcome"></h3>

<h2 id="counter">Flips: 0</h2>
<h3 id="highscore">Highscore: 0</h3>

<div id="coin">🪙</div>

<br>

<button onclick="flipCoin()">Münze werfen</button>

<div id="result"></div>

<div class="shop">
<h2>🛒 Shop</h2>

<button id="buyX2" onclick="buyX2()">
x2 Multiplikator (1000 Flips)
</button>

<br>

<button id="buyX5" onclick="buyX5()">
x5 Multiplikator (10000 Flips)
</button>

</div>

<script>

let flips = parseInt(localStorage.getItem("flips")) || 0;
let highscore = parseInt(localStorage.getItem("highscore")) || 0;

let username = localStorage.getItem("username") || "";

let multiplier = parseInt(localStorage.getItem("multiplier")) || 1;

let hasX2 = localStorage.getItem("hasX2") === "true";
let hasX5 = localStorage.getItem("hasX5") === "true";

document.getElementById("username").value = username;

if(username){
    document.getElementById("welcome").textContent =
    "Willkommen " + username + "!";
}

function saveName(){

    username =
    document.getElementById("username").value.trim();

    if(username){

        localStorage.setItem("username", username);

        document.getElementById("welcome").textContent =
        "Willkommen " + username + "!";
    }
}

function updateCoin(){

    const coin =
    document.getElementById("coin");

    if(flips >= 10000){
        coin.textContent = "🌈";
    }
    else if(flips >= 1000){
        coin.textContent = "💎";
    }
    else if(flips >= 100){
        coin.textContent = "🥇";
    }
    else{
        coin.textContent = "🪙";
    }
}

function updateStats(){

    document.getElementById("counter").textContent =
    "Flips: " + flips;

    document.getElementById("highscore").textContent =
    "Highscore: " + highscore;

    if(hasX2){
        document.getElementById("buyX2").disabled = true;
        document.getElementById("buyX2").textContent =
        "✓ x2 gekauft";
    }

    if(hasX5){
        document.getElementById("buyX5").disabled = true;
        document.getElementById("buyX5").textContent =
        "✓ x5 gekauft";
    }
}

function buyX2(){

    if(hasX2) return;

    if(flips >= 1000){

        flips -= 1000;

        multiplier *= 2;

        hasX2 = true;

        localStorage.setItem("hasX2", true);
        localStorage.setItem("multiplier", multiplier);
        localStorage.setItem("flips", flips);

        updateStats();
    }
    else{
        alert("Du brauchst 1000 Flips!");
    }
}

function buyX5(){

    if(hasX5) return;

    if(flips >= 10000){

        flips -= 10000;

        multiplier *= 5;

        hasX5 = true;

        localStorage.setItem("hasX5", true);
        localStorage.setItem("multiplier", multiplier);
        localStorage.setItem("flips", flips);

        updateStats();
    }
    else{
        alert("Du brauchst 10000 Flips!");
    }
}

function flipCoin(){

    flips += multiplier;

    if(flips > highscore){

        highscore = flips;

        localStorage.setItem(
            "highscore",
            highscore
        );
    }

    localStorage.setItem(
        "flips",
        flips
    );

    updateCoin();
    updateStats();

    const coin =
    document.getElementById("coin");

    coin.classList.remove("flip");

    void coin.offsetWidth;

    coin.classList.add("flip");

    const result =
    Math.random() < 0.5
    ? "Kopf"
    : "Zahl";

    setTimeout(() => {

        document.getElementById("result").textContent =
        "Ergebnis: " + result;

    },400);
}

updateCoin();
updateStats();

</script>

</body>
</html>
